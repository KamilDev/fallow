<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none">
  <style>
    @media (prefers-color-scheme: dark) {
      .text { fill: #e5e7eb; }
      .accent { fill: #f59e0b; }
    }
    @media (prefers-color-scheme: light) {
      .text { fill: #1f2937; }
      .accent { fill: #d97706; }
    }
  </style>
  <!-- Wheat/fallow field icon -->
  <g transform="translate(4, 8)">
    <!-- Stem 1 -->
    <path d="M20 48 L20 16" stroke="#d97706" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M20 16 C14 10 14 4 20 2 C26 4 26 10 20 16" class="accent" fill="#d97706" opacity="0.9"/>
    <path d="M20 24 C14 18 12 12 16 10" stroke="#d97706" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M20 24 C26 18 28 12 24 10" stroke="#d97706" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Stem 2 -->
    <path d="M34 48 L34 20" stroke="#d97706" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M34 20 C28 14 28 8 34 6 C40 8 40 14 34 20" class="accent" fill="#d97706" opacity="0.9"/>
    <path d="M34 28 C28 22 26 16 30 14" stroke="#d97706" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M34 28 C40 22 42 16 38 14" stroke="#d97706" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Stem 3 (shorter, withered - representing dead/unused code) -->
    <path d="M48 48 L48 26" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-dasharray="3,3"/>
    <path d="M48 26 C44 22 44 18 48 17 C52 18 52 22 48 26" fill="#9ca3af" opacity="0.5"/>
  </g>
  <!-- Text -->
  <text x="72" y="44" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="38" font-weight="700" letter-spacing="-1" class="text" fill="#1f2937">fallow</text>
</svg>
